<div
  class="yat-agent"
  data-yat-agent
  data-search-index-url="{{ 'search/search_index.json' | url }}"
  data-current-page="{{ page.file.src_uri }}"
  data-current-title="{{ page.title | e }}"
>
  <div class="yat-agent__nudge" data-agent-nudge>
    <span>快来问问agent吧！</span>
    <button class="yat-agent__nudge-close" type="button" data-agent-dismiss-nudge aria-label="关闭提示">×</button>
  </div>
  <button class="yat-agent__fab" type="button" aria-expanded="false" aria-controls="yat-agent-panel" aria-label="打开文档助手">
    <img class="yat-agent__fab-logo" src="{{ 'img/nexa-logo-noframe.png' | url }}" alt="">
  </button>

  <section class="yat-agent__panel" id="yat-agent-panel" aria-label="文档助手">
    <header class="yat-agent__header">
      <div>
        <p class="yat-agent__eyebrow">Nexa Agent</p>
        <h2>Nexa 文档助手</h2>
      </div>
      <button class="yat-agent__icon-button" type="button" data-agent-close aria-label="关闭对话窗">关闭</button>
    </header>

    <div class="yat-agent__messages" data-agent-messages aria-live="polite">
      <article class="yat-agent__message yat-agent__message--assistant yat-agent__message--intro">
        <p>我是Nexa文档AI助手，可以问我有关文档的一切！</p>
      </article>
    </div>

    <form class="yat-agent__composer" data-agent-form>
      <textarea
        class="yat-agent__input"
        name="prompt"
        rows="1"
        placeholder="Nexa的>>操作符可以怎么用？"
        required
      ></textarea>
      <div class="yat-agent__composer-actions">
        <span class="yat-agent__meta" data-agent-status data-ready="true">
          <span class="yat-agent__meta-dot" aria-hidden="true"></span>
          <span>由AI Hub提供支持</span>
        </span>
        <button class="md-button md-button--primary yat-agent__send" type="submit">发送</button>
      </div>
    </form>
  </section>
</div>

<script type="module" src="{{ 'javascripts/doc-agent.js' | url }}"></script>
