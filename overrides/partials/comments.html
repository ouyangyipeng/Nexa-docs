{% if page.meta.comments is not defined or page.meta.comments %}
<section class="md-comments" aria-label="评论区">
  <script
    src="https://giscus.app/client.js"
    data-repo="ouyangyipeng/Nexa-docs"
    data-repo-id="R_kgDORpFikw"
    data-category="Announcements"
    data-category-id="DIC_kwDORpFik84C4knT"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="preferred_color_scheme"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async
  ></script>
  <script>
    var giscus = document.querySelector("script[src*=\"giscus\"]")
    function resolveGiscusTheme() {
      var palette = typeof __md_get === "function" ? __md_get("__palette") : null
      if (palette && typeof palette.color === "object") {
        return palette.color.scheme === "slate" ? "transparent_dark" : "light"
      }
      return "light"
    }
    if (giscus) {
      giscus.setAttribute("data-theme", resolveGiscusTheme())
    }
    document.addEventListener("DOMContentLoaded", function () {
      var ref = document.querySelector("[data-md-component=\"palette\"]")
      if (!ref) { return }
      ref.addEventListener("change", function () {
        var frame = document.querySelector(".giscus-frame")
        if (!frame || !frame.contentWindow) { return }
        frame.contentWindow.postMessage(
          { giscus: { setConfig: { theme: resolveGiscusTheme() } } },
          "https://giscus.app"
        )
      })
    })
  </script>
</section>
{% endif %}
