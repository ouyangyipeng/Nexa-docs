site_name: Nexa 官方文档
site_description: 智能体原生 (Agent-Native) 编程语言
theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  logo: img/nexa-logo-noframe.png
  favicon: img/nexa-logo.png
  font:
    text: false
    code: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css
  - stylesheets/agent.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js
  - javascripts/katex.js
  - javascripts/navigation-accordion.js
  - javascripts/image-lightbox.js

extra:
  generator: false

nav:
  - 主页:
    - 首页: index.md
    - 前言与理念: 
      - 重构智能体开发范式: preface.md
      - 调研背景与技术演进: preface_background.md
      - 典型场景与对比分析: preface_scenarios.md
    - 贡献与参与: contribution.md
  - 语法指南:
    - 基础语法: part1_basic.md
    - 高级特性: part2_advanced.md
    - 语法扩展: part3_extensions.md
    - 生态与标准库: part4_ecosystem_and_stdlib.md
  - 深入设计:
    - 编译器设计: part5_compiler.md
    - 企业级架构特性: part5_enterprise.md
    - 架构演进与未来(Rust/WASM): part5_architecture_evolution.md
    - 最佳实践: part6_best_practices.md
  - 社区与未来:
    - 未来展望: part4_future.md
    - 社区与生态: part7_community.md
