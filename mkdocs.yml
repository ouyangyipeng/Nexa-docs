site_name: Nexa 官方文档
site_description: 智能体原生 (Agent-Native) 编程语言
site_url: https://ouyangyipeng.github.io/Nexa-docs/
theme:
  name: material
  custom_dir: docs/overrides
  logo: img/nexa-logo-noframe.png
  favicon: img/nexa-logo.png
  font:
    text: false
    code: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - toc.follow

plugins:
  - i18n:
      languages:
        - locale: zh
          name: 简体中文
          default: true
          site_name: Nexa 官方文档
          nav_translations:
            主页: 主页
            首页: 首页
            快速入门: 快速入门
            前言与理念: 前言与理念
            重构智能体开发范式: 重构智能体开发范式
            调研背景与技术演进: 调研背景与技术演进
            典型场景与对比分析: 典型场景与对比分析
            贡献与参与: 贡献与参与
            语法指南: 语法指南
            基础语法: 基础语法
            高级特性: 高级特性
            语法扩展: 语法扩展
            生态与标准库: 生态与标准库
            深入设计: 深入设计
            编译器设计: 编译器设计
            企业级架构特性: 企业级架构特性
            架构演进与未来(Rust/WASM): 架构演进与未来(Rust/WASM)
            最佳实践: 最佳实践
            社区与未来: 社区与未来
            未来展望: 未来展望
            社区与生态: 社区与生态
            参考资源: 参考资源
            完整示例集合: 完整示例集合
            常见问题与排查: 常见问题与排查
            参考手册: 参考手册
            语言参考: 语言参考
            CLI 命令参考: CLI 命令参考
            标准库 API: 标准库 API
            错误索引: 错误索引
        - locale: en
          name: English
          site_name: Nexa Documentation
          nav_translations:
            主页: Home
            首页: Index
            快速入门: Quickstart
            前言与理念: Preface & Philosophy
            重构智能体开发范式: Reshaping Agent Paradigm
            调研背景与技术演进: Background & Evolution
            典型场景与对比分析: Scenarios & Analysis
            贡献与参与: Contribution
            语法指南: Grammar Guide
            基础语法: Basic Syntax
            高级特性: Advanced Features
            语法扩展: Grammar Extensions
            生态与标准库: Ecosystem & Stdlib
            深入设计: In-depth Design
            编译器设计: Compiler Design
            企业级架构特性: Enterprise Features
            架构演进与未来(Rust/WASM): Architecture Evolution
            最佳实践: Best Practices
            社区与未来: Community & Future
            未来展望: Roadmap
            社区与生态: Community
            参考资源: Resources
            完整示例集合: Example Collection
            常见问题与排查: Troubleshooting
            参考手册: Reference Manual
            语言参考: Language Reference
            CLI 命令参考: CLI Reference
            标准库 API: Stdlib API
            错误索引: Error Index
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css
  - stylesheets/agent.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js
  - javascripts/katex.js
  - javascripts/navigation-accordion.js
  - javascripts/image-lightbox.js

extra:
  generator: false

nav:
  - 主页:
    - 首页: index.md
    - 快速入门: quickstart.md
    - 前言与理念:
      - 重构智能体开发范式: preface.md
      - 调研背景与技术演进: preface_background.md
      - 典型场景与对比分析: preface_scenarios.md
    - 贡献与参与: contribution.md
  - 语法指南:
    - 基础语法: part1_basic.md
    - 高级特性: part2_advanced.md
    - 语法扩展: part3_extensions.md
    - 生态与标准库: part4_ecosystem_and_stdlib.md
  - 深入设计:
    - 编译器设计: part5_compiler.md
    - 企业级架构特性: part5_enterprise.md
    - 架构演进与未来(Rust/WASM): part5_architecture_evolution.md
    - 最佳实践: part6_best_practices.md
  - 社区与未来:
    - 未来展望: part4_future.md
    - 社区与生态: part7_community.md
  - 参考资源:
    - 完整示例集合: examples.md
    - 常见问题与排查: troubleshooting.md
  - 参考手册:
    - 语言参考: reference.md
    - CLI 命令参考: cli_reference.md
    - 标准库 API: stdlib_reference.md
    - 错误索引: error_index.md
