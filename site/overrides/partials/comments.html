{% if page.meta.comments is not defined or page.meta.comments %}
  <h2 id="__comments">{{ lang.t("meta.comments") | default("评论区 Discussion") }}</h2>
  <script src="https://giscus.app/client.js"
          data-repo="your-org/Nexa-docs"
          data-repo-id="R_kgD_xxxx"
          data-category="Announcements"
          data-category-id="DIC_kwD_xxxx"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="preferred_color_scheme"
          data-lang="zh-CN"
          crossorigin="anonymous"
          async>
  </script>
  <p class="nexa-giscus-note" style="font-size: 0.8em; color: gray; margin-top: 10px;">
    正在加载来自对应 Github 仓库 (Nexa-docs) 的 Discussions 评论区...
  </p>
{% endif %}
